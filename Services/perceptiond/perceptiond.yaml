camera:
  device: /dev/video0
  width: 640
  height: 480
  fps: 5

salience:
  motion_threshold: 0.05
  pixel_delta_threshold: 30
  background_update_interval: 30
  mode: "any"  # "motion" | "face" | "any"
  face_scale_factor: 1.1
  face_min_neighbors: 5
  face_min_size: 30

vlm:
  model_path: /home/workspace/danlab-multimodal/models/LFM2.5-VL-450M-Q4_0.gguf
  mmproj_path: /home/workspace/danlab-multimodal/models/mmproj-LFM2.5-VL-450m-F16.gguf
  llama_cli_path: /home/workspace/danlab-multimodal/llama.cpp/build/bin/llama-mtmd-cli
  prompt: "Describe this image briefly. Focus on: people, objects, text, activities."
  max_tokens: 100
  timeout: 240

server:
  socket_path: /var/run/perceptiond.sock
  mode: stdout

power:
  mode: watchful

dedup:
  threshold: 0.02  # v7.0: skip VLM if motion score delta < 2% from last trigger
  window: 5        # rolling-baseline window for scene-change detection

# v8.0 — cross-daemon memory ingest
# Fire-and-forget POST of each description to memoryd /memories as episodic.
# memoryd is on :8090; turn off (enabled: false) to disable without removing config.
memory_sink:
  enabled: true
  url: http://localhost:8741/memories
  type: episodic
  timeout: 2.0
  queue_size: 256

# v12.0 — durable description log.
# Append-only JSONL of every published description. Backs
# /descriptions?since=<id> for reconnecting clients when the in-memory
# ring has rolled past their last-seen id. Bounded by lines_cap and
# bytes_cap (oldest evicted first). Set enabled: false to disable.
description_log:
  enabled: true
  path: /home/workspace/.cache/dan-glasses/perceptiond/descriptions.log
  lines_cap: 50000                # ~5 days at 1 description / 10s
  bytes_cap: 52428800             # 50 MiB

# v10.0 — disk-persisted image retention.
# When set, every accepted put() also writes <image_id>.jpg + <image_id>.json
# to `image_dir`. LRU-evicted when total bytes > max_bytes. Set
# max_bytes: 0 to disable disk persistence (in-memory ring only).
frame_store:
  image_dir: /home/workspace/.cache/dan-glasses/perceptiond/frames
  max_bytes: 209715200  # 200 MiB

# v13.0 — salient frame event stream.
# Every frame that triggers salience (motion, face, or both) emits a
# "frame_event" to this log. Bounded by lines_cap + bytes_cap. Distinct
# from description_log: description_log = what the VLM said;
# frame_event_log = what the system SAW (raw salience, pre-VLM, including
# frames the SceneGate dedup-skipped). Off by default (enabled: false)
# to avoid double-counting with the description stream on the dashboard.
frame_events:
  enabled: true
  path: /home/workspace/.cache/dan-glasses/perceptiond/frame_events.log
  lines_cap: 20000                # ~55 hours at 1 event / 10s
  bytes_cap: 20971520             # 20 MiB
