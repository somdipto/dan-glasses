audio:
  device: default
  sample_rate: 16000
  channels: 1
  period_size: 512
  buffer_periods: 8

vad:
  model: silero_vit.onnx
  threshold: 0.5
  min_speech_ms: 250
  min_silence_ms: 200

whisper:
  model: /home/workspace/dan-glasses/models/ggml-base.bin
  language: auto
  threads: 2

publish:
  mode: stdout
  socket_path: /run/audiod.sock
  ws_port: 8091

push_to_talk:
  enabled: false
  hotkey: space

# v1.3: structured-metric push sink (Loki).
# `enabled: null` defers to the AUDIOD_METRICS env var; explicit
# true/false overrides regardless of env. interval_s=10 keeps p50/p95
# graphs lively without flooding the push endpoint.
metrics:
  enabled: null
  loki_url: http://localhost:3100/loki/api/v1/push
  interval_s: 10
  timeout_s: 2
